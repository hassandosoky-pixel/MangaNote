name: Build Android APK from ZIP

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Unzip Project Files
      run: unzip -q *.zip

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build APK (Auto-detect directory)
      run: |
        
        PROJECT_DIR=$(dirname $(find . -name "gradlew" | head -n 1))
        echo "Found Android project in: $PROJECT_DIR"
        cd "$PROJECT_DIR"
        
        
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MangaVault-Debug-APK
        path: '**/app/build/outputs/apk/debug/*.apk'
