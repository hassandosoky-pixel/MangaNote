name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Unzip Project Files
      run: unzip -q *.zip

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build APK using System Gradle
      run: |
        # الكود ده بيدور على مسار المشروع الأساسي باستخدام ملف الإعدادات
        PROJECT_DIR=$(dirname $(find . -name "settings.gradle*" | head -n 1))
        echo "Found project root in: $PROJECT_DIR"
        cd "$PROJECT_DIR"
        
        # استخدام الجرادل الخاص بالسيرفر لبناء التطبيق مباشرة
        gradle assembleDebug

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MangaVault-Debug-APK
        path: '**/app/build/outputs/apk/debug/*.apk'
